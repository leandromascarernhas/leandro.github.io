<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Platinum 98%</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.aviso{
background:#fff3cd;
padding:10px;
border-radius:6px;
font-size:14px;
margin-bottom:15px;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
}

.result{
margin-top:20px;
font-size:18px;
line-height:1.6;
}

.progress{
width:100%;
height:22px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
margin-bottom:15px;
}

.bar{
height:100%;
color:white;
text-align:center;
line-height:22px;
font-size:14px;
font-weight:bold;
transition:0.5s;
}

.green{background:#2e7d32;}
.yellow{background:#f9a825;}
.red{background:#c62828;}

.good{color:green;}

</style>
</head>

<body>

<div class="container">

<h1>Platinum 98%</h1>

<div class="aviso">
⚠ Média considerada: <b>70 pacotes por rota</b>
</div>

<label>Pacotes</label>
<input type="number" id="pacotes">

<label>Insucessos</label>
<input type="number" id="insucessos">

<label>Reclamações</label>
<input type="number" id="reclamacoes">

<button onclick="calcular()">Calcular</button>

<div class="result" id="resultado"></div>

</div>

<script>

function calcular(){

let p = Number(document.getElementById("pacotes").value);
let i = Number(document.getElementById("insucessos").value);
let r = Number(document.getElementById("reclamacoes").value);

if(p<=0){
document.getElementById("resultado").innerHTML="Digite valores válidos";
return;
}

/* SUCESSO 98% */
let s = p - i;
let sucesso = (s/p)*100;

/* PACOTES PARA 98% */
let falta = 0;
while(((s + falta) / (p + falta)) < 0.98){
    falta++;
}

/* ROTAS 98% */
let rotas98 = Math.ceil(falta / 70);

/* SALDO INSUCESSOS */
let maxInsucesso = Math.floor(p*0.02);
let saldo = maxInsucesso - i;

/* RECLAMAÇÃO 99,70% */
let sucessoRec = ((p - r) / p) * 100;

/* PACOTES PARA 99,70% */
let faltaRec = 0;
while(((p - r + faltaRec) / (p + faltaRec)) < 0.997){
    faltaRec++;
}

/* ROTAS 99,70% */
let rotasRec = Math.ceil(faltaRec / 70);

/* CORES */
let corBar = "red";
if(sucesso>=98){corBar="green";}
else if(sucesso>=97){corBar="yellow";}

let corBarRec = sucessoRec>=99.7 ? "green" : "yellow";

/* META ATINGIDA */
let msgRec = "";
if(sucessoRec>=99.7){
    faltaRec = 0;
    rotasRec = 0;
    msgRec = "✅ Meta atingida!";
}

/* RESULTADO */
document.getElementById("resultado").innerHTML=

"<div><b>Sucesso:</b> "+sucesso.toFixed(2)+"%</div>"+

"<div class='progress'><div class='bar "+corBar+"' style='width:"+sucesso+"%'>"+sucesso.toFixed(1)+"%</div></div>"+

"<div><b>Pacotes necessários para 98%:</b> "+falta+"</div>"+

"<div><b>Rotas necessárias:</b> "+falta+" ÷ 70 = "+rotas98+"</div>"+

"<div><b>Saldo de insucessos permitido:</b> "+saldo+"</div>"+

"<hr>"+

"<div><b>Reclamação:</b> "+sucessoRec.toFixed(2)+"%</div>"+

"<div class='progress'><div class='bar "+corBarRec+"' style='width:"+sucessoRec+"%'>"+sucessoRec.toFixed(1)+"%</div></div>"+

"<div><b>Pacotes necessários para 99,70%:</b> "+faltaRec+"</div>"+

"<div><b>Rotas necessárias:</b> "+faltaRec+" ÷ 70 = "+rotasRec+"</div>"+

"<div class='good'>"+msgRec+"</div>";

}

</script>

</body>
</html>
