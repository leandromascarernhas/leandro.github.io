<!DOCTYPE html><html lang="pt">
<head>
<meta charset="UTF-8">
<title>Controle Meta 98%</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
font-family: Arial;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
}

.result{
margin-top:20px;
font-size:18px;
line-height:1.6;
}

.good{color:green;}
.warn{color:orange;}
.bad{color:red;}

</style></head><body><div class="container"><h1>Meta 98%</h1><label>Pacotes</label>
<input type="number" id="pacotes">

<label>Insucessos</label>
<input type="number" id="insucessos">

<button onclick="calcular()">Calcular</button>

<div class="result" id="resultado"></div></div><script>

function calcular(){

let p = Number(document.getElementById("pacotes").value);
let i = Number(document.getElementById("insucessos").value);

if(p<=0){
document.getElementById("resultado").innerHTML="Digite valores válidos";
return;
}

let s = p - i;

let sucesso = (s/p)*100;

/* pacotes perfeitos necessários */
let falta = Math.ceil((0.98*p - s)/0.02);

if(falta < 0){
falta = 0;
}

/* saldo de insucessos permitido */
let maxInsucesso = Math.floor(p*0.02);
let saldo = maxInsucesso - i;

let classe="bad";

if(sucesso>=98){classe="good";}
else if(sucesso>=97){classe="warn";}

document.getElementById("resultado").innerHTML=

"<div class='"+classe+"'><b>Sucesso:</b> "+sucesso.toFixed(2)+"%</div>"+

"<div><b>Pacotes necessários para chegar a 98%:</b> "+falta+"</div>"+

"<div><b>Saldo de insucessos permitido:</b> "+saldo+"</div>";

}

</script></body>
</html>
